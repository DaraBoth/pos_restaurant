name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
          - platform: macos-latest
            rust-target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (capture output for error reporting)
        id: build_frontend
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee "$RUNNER_TEMP/next-build.log"

      # Tauri CLI tries to base64-decode TAURI_SIGNING_PRIVATE_KEY when the
      # value is not a file path. The raw rsign key content is NOT base64, so
      # that decode fails with "invalid utf-8 sequence" on both Windows and
      # macOS. Writing the key to a temp file and setting the env var to the
      # path forces Tauri to use its file-reading code path instead. printf %b
      # on macOS and the PowerShell -replace on Windows both expand literal \n
      # escape sequences that may be present in the GitHub secret value.
      - name: Prepare signing key (macOS)
        if: runner.os == 'macOS'
        run: |
          KEY_PATH="${RUNNER_TEMP}/tauri.key"
          printf '%b' "${TAURI_SIGNING_PRIVATE_KEY_RAW}" > "${KEY_PATH}"
          echo "TAURI_SIGNING_PRIVATE_KEY=${KEY_PATH}" >> "${GITHUB_ENV}"
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Prepare signing key (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $keyPath = "$env:RUNNER_TEMP\tauri.key"
          $keyContent = $env:TAURI_SIGNING_PRIVATE_KEY_RAW -replace '\\n', "`n"
          Set-Content -Path $keyPath -Value $keyContent -NoNewline -Encoding utf8
          "TAURI_SIGNING_PRIVATE_KEY=$keyPath" >> $env:GITHUB_ENV
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Both prepare steps set TAURI_SIGNING_PRIVATE_KEY in GITHUB_ENV to
          # a temp file path; env.TAURI_SIGNING_PRIVATE_KEY (the path) is
          # truthy and takes precedence over the raw secret via the || fallback.
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        with:
          args: --target ${{ matrix.rust-target }}
          tagName: v__VERSION__
          releaseName: "DineOS v__VERSION__"
          releaseBody: "Automated production build for DineOS POS."
          # IMPORTANT: must be `false` so GitHub's /releases/latest endpoint
          # resolves to this release. The Tauri updater fetches latest.json
          # from that URL — drafts are invisible to it and the updater
          # silently 404s, which is what made the auto-update flow look
          # broken in v2.3.x. See CLAUDE.md "Auto-update" for the full flow.
          releaseDraft: false
          prerelease: false

      - name: Report CI failure to ORBIT
        if: failure()
        shell: bash
        env:
          ORBIT_API_KEY: ${{ secrets.ORBIT_API_KEY }}
          CI_PLATFORM: ${{ matrix.platform }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_REF: ${{ github.ref }}
          CI_SHA: ${{ github.sha }}
        run: |
          if [ -z "$ORBIT_API_KEY" ]; then exit 0; fi
          python3 << 'PYEOF'
import json, os, re, urllib.request

log_file = os.path.join(os.environ.get('RUNNER_TEMP', '/tmp'), 'next-build.log')
excerpt = ''
if os.path.exists(log_file):
    with open(log_file, 'r', errors='replace') as f:
        lines = f.readlines()
    # Strip ANSI escape codes
    ansi = re.compile(r'\x1b\[[0-9;]*[mKG]')
    lines = [ansi.sub('', l) for l in lines]
    # Extract lines around known error markers
    result = []
    for i, line in enumerate(lines):
        if any(k in line for k in ['Failed to compile', 'Type error', 'error[E', 'Error:']):
            result.extend(lines[max(0, i - 2):min(len(lines), i + 20)])
            if len(result) > 80:
                break
    excerpt = ''.join(result[-80:]) if result else ''.join(lines[-60:])
    # Sanitize secrets
    excerpt = re.sub(r'AUTH_TOKEN=\S+', 'AUTH_TOKEN=<redacted>', excerpt)
    excerpt = re.sub(r'DATABASE_URL=\S+', 'DATABASE_URL=<redacted>', excerpt)
    excerpt = re.sub(r'dgm_[A-Za-z0-9]+', '<orbit-key>', excerpt)
    excerpt = excerpt[:3000]

platform = os.environ['CI_PLATFORM']
body = (
    f"**Platform:** {platform}\n"
    f"**Run:** {os.environ['CI_RUN_URL']}\n"
    f"**Ref:** {os.environ['CI_REF']}\n"
    f"**SHA:** {os.environ['CI_SHA']}"
)
if excerpt:
    body += f"\n\n**Build error excerpt:**\n```\n{excerpt}\n```"

payload = {
    'tool': 'tasks.create',
    'input': {
        'title': f'[ci-error] Release build failed ({platform})',
        'description': body,
        'tags': ['wf:error', 'assign:code-reviewer', 'project:dineos']
    }
}
req = urllib.request.Request(
    'https://dailygoalmap.vercel.app/api/mcp',
    data=json.dumps(payload).encode(),
    headers={'Content-Type': 'application/json', 'X-Project-Api-Key': os.environ['ORBIT_API_KEY']}
)
try:
    urllib.request.urlopen(req, timeout=15)
    print('ORBIT error task filed.')
except Exception as e:
    print(f'Failed to file ORBIT task: {e}')
PYEOF

      - name: Clean up signing key (macOS)
        if: always() && runner.os == 'macOS'
        run: rm -f "${RUNNER_TEMP}/tauri.key"

      - name: Clean up signing key (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: Remove-Item -Force "$env:RUNNER_TEMP\tauri.key" -ErrorAction SilentlyContinue
